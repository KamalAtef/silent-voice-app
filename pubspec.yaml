name: silentvoice
description: "Sign language translation app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Camera & ML Kit (Sign Language) ───────────────────────────────────────
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # ── Networking ─────────────────────────────────────────────────────────────
  http: ^1.2.2
  dio: ^5.4.0

  # ── Storage & Auth ─────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # ── Voice Recording & TTS ──────────────────────────────────────────────────
  record: ^6.1.2
  flutter_tts: ^4.0.2
  path_provider: ^2.1.2

  # ── Permissions ────────────────────────────────────────────────────────────
  permission_handler: ^11.3.0

  # ── UI & Utilities ─────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  share_plus: ^10.0.2
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

# ── Dependency overrides ───────────────────────────────────────────────────
dependency_overrides:
  record_linux: ^1.0.0
  record_platform_interface: ^1.5.0

# ── App Icon ───────────────────────────────────────────────────────────────
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/profile_icon.png
    - assets/images/hello.png
    - assets/icon/app_icon.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
    - family: MontserratArabic
      fonts:
        - asset: assets/fonts/Montserrat-Arabic Light 300.otf
          weight: 300
        - asset: assets/fonts/Montserrat-Arabic Medium 500.otf
          weight: 500
        - asset: assets/fonts/Montserrat-Arabic Bold 700.otf
          weight: 700
